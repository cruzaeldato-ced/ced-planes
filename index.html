    function PlanCard({ plan, selected, onClick }) {
      const isSelected = selected === plan.id;
      return (
        <div onClick={onClick} style={{
          background: isSelected ? `${plan.color}12` : "#0d0d1a",
          border: `2px solid ${isSelected ? plan.color : "#1a1a2e"}`,
          borderRadius: 14, padding: "20px 18px", cursor: "pointer",
          transition: "all 0.25s ease", position: "relative", overflow: "hidden",
        }}>
          {plan.tag && (
            <div style={{
              position: "absolute", top: 12, right: 12,
              background: isSelected ? plan.color : "#1a1a2e",
              color: isSelected ? "#000" : plan.color,
              fontSize: 10, fontWeight: 800, padding: "3px 9px", borderRadius: 20,
              letterSpacing: 1, textTransform: "uppercase", border: `1px solid ${plan.color}`,
            }}>{plan.tag}</div>
          )}
          <div style={{ color: plan.color, fontSize: 10, fontWeight: 700, letterSpacing: 2, marginBottom: 4 }}>{plan.clave}</div>
          <div style={{ color: "#e5e7eb", fontWeight: 800, fontSize: 15, marginBottom: 12, letterSpacing: -0.3 }}>{plan.nombre}</div>

          </div>

              </div>

              <div style={{ textAlign: "center" }}>
                <div style={{ color: plan.color, fontSize: 20, fontWeight: 900, fontFamily: "monospace" }}>{plan.impactosMes}</div>

          }}>

          </div>
          <span style={{ color: "#9ca3af", fontSize: 13, lineHeight: 1.5 }}>{text}</span>

    function PlanCED() {
      const [selected, setSelected] = useState(3);
      const plan = plans.find(p => p.id === selected);
      const costBase = COST_BASE;
      const ahorro = ((costBase * plan.impactosMes) - plan.precioMes).toFixed(0);

              <div style={{ color: "#f43f5e", fontWeight: 700, fontSize: 12, marginBottom: 6, letterSpacing: 0.5 }}>📝 SLIDE 1 · La Noticia</div>
              <div style={{ color: "#6b7280", fontSize: 12, lineHeight: 1.6 }}>
                Contenido editorial de CED: noticia, dato verificado o hecho de coyuntura. Tu marca aparece integrada al final del <strong style={{ color: "#9ca3af" }}>caption</strong> con un mensaje o CTA definido contigo.
              </div>
            </div>
            <div style={{ padding: "12px 16px", background: "#f43f5e0a", border: "1px solid #f43f5e22", borderRadius: 8 }}>
              <div style={{ color: "#f43f5e", fontWeight: 700, fontSize: 12, marginBottom: 6, letterSpacing: 0.5 }}>🎨 SLIDE 2 · Tu Arte</div>
              <div style={{ color: "#6b7280", fontSize: 12, lineHeight: 1.6 }}>
                Segunda lámina del carrusel con <strong style={{ color: "#9ca3af" }}>arte 100% personalizado</strong> de tu marca: promo, producto, oferta o branding. Producción incluida por CED o arte enviado por la marca.
              </div>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 10, marginBottom: 24 }}>
            {plans.map(p => <PlanCard key={p.id} plan={p} selected={selected} onClick={() => setSelected(p.id)} />)}
          </div>

          <div style={{ background: "#0d0d1a", border: `2px solid ${plan.color}44`, borderRadius: 14, padding: 24, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, marginBottom: 20 }}>
            <div>
              <div style={{ color: plan.color, fontWeight: 900, fontSize: 18, marginBottom: 4 }}>{plan.nombre}</div>

              </div>
            </div>
            <div>
              <div style={{ color: "#6b7280", fontSize: 11, textTransform: "uppercase", letterSpacing: 1, marginBottom: 14 }}>Métricas del plan</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>

                  <div key={l} style={{ background: "#06060f", border: "1px solid #1a1a2e", borderRadius: 8, padding: "12px 14px" }}>
                    <div style={{ color: "#4b5563", fontSize: 10, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>{l}</div>
                    <div style={{ color: plan.color, fontSize: 22, fontWeight: 900, fontFamily: "monospace" }}>{v}</div>
                    <div style={{ color: "#374151", fontSize: 10 }}>{s}</div>
                  </div>
                ))}
              </div>
              <div style={{ background: "#06060f", border: `1px solid ${plan.color}33`, borderRadius: 8, padding: "14px 16px", marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <div style={{ color: "#6b7280", fontSize: 11 }}>Precio de referencia sin descuento</div>
                  <div style={{ color: "#4b5563", fontWeight: 700, fontFamily: "monospace", textDecoration: "line-through" }}>${(costBase * plan.impactosMes).toFixed(0)}</div>

                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <div style={{ color: "#9ca3af", fontSize: 12 }}>Precio de este plan</div>
                  <div style={{ color: plan.color, fontWeight: 900, fontFamily: "monospace", fontSize: 18 }}>${plan.precioMes}</div>

                <div style={{ borderTop: "1px solid #1a1a2e", paddingTop: 8 }}>
                  <div style={{ display: "flex", justifyContent: "space-between" }}>
                    <div style={{ color: "#10b981", fontSize: 12, fontWeight: 700 }}>Ahorro estimado</div>
                    <div style={{ color: "#10b981", fontWeight: 900, fontFamily: "monospace" }}>${ahorro > 0 ? ahorro : 0} ({pctAhorro > 0 ? pctAhorro : 0}%)</div>

          <div style={{ background: "#0d0d1a", border: "1px solid #1a1a2e", borderRadius: 12, padding: 20 }}>

            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead>
                <tr style={{ borderBottom: "1px solid #1a1a2e" }}>

                    <th key={h} style={{ textAlign: h === "Plan" ? "left" : "center", padding: "8px 10px", color: "#4b5563", fontWeight: 600, fontSize: 10, textTransform: "uppercase" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {plans.map(p => {
                  const basePrice = costBase * p.impactosMes;
                  const saving = basePrice - p.precioMes;
                  const pct = ((saving / basePrice) * 100).toFixed(0);
                  const isActive = selected === p.id;
                  return (
                    <tr key={p.id} onClick={() => setSelected(p.id)} style={{ borderBottom: "1px solid #06060f", background: isActive ? `${p.color}0a` : "transparent", cursor: "pointer", transition: "background 0.2s" }}>
                      <td style={{ padding: "10px 10px", color: isActive ? p.color : "#9ca3af", fontWeight: 700 }}>
                        {p.nombre}<div style={{ color: "#4b5563", fontWeight: 400, fontSize: 10 }}>{p.clave}</div>
                      </td>
                      <td style={{ textAlign: "center", color: isActive ? p.color : "#6b7280", fontFamily: "monospace", fontWeight: 700 }}>{p.impactosSemana}</td>
                      <td style={{ textAlign: "center", color: isActive ? p.color : "#6b7280", fontFamily: "monospace", fontWeight: 700 }}>{p.impactosMes}</td>
                      <td style={{ textAlign: "center", color: isActive ? p.color : "#e5e7eb", fontFamily: "monospace", fontWeight: 800, fontSize: 14 }}>${p.precioMes}</td>
                      <td style={{ textAlign: "center", color: "#6b7280", fontFamily: "monospace" }}>${(p.precioMes / p.impactosMes).toFixed(1)}</td>
                      <td style={{ textAlign: "center", color: saving > 0 ? "#10b981" : "#4b5563", fontWeight: 700 }}>{saving > 0 ? `$${saving.toFixed(0)} (${pct}%)` : "—"}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={{ textAlign: "center", marginTop: 18, color: "#1f2937", fontSize: 10 }}>
            Precios estimados sin IVA · Basados en PT#3 Dato VIP de la propuesta CED 2026 · Alcance orgánico estimado sobre métricas declaradas por el medio
          </div>
        </div>
      );

    /* ══════════════════════════════════════════════════════════
       COMPONENT 2 · MATRIZ INDIVIDUAL (matriz_individual_ced.jsx)
    ══════════════════════════════════════════════════════════ */

    const CATALOGO = [
      { id: "noticia", tipo: "Noticia", emoji: "📰", color: "#f43f5e", variantes: [{ id: "noticia_std", nombre: "Noticia con mención", desc: "Mención de marca en caption + imagen personalizada como 2do slide", precio: 30, badge: "Caption + Slide 2", badgeColor: "#f43f5e", alcance: 3500, plataformas: ["IG Feed", "X", "TikTok"] }] },
      { id: "carrusel", tipo: "Carrusel", emoji: "🗂️", color: "#3b82f6", variantes: [
        { id: "carrusel_e1", nombre: "Estilo 1 · Dato al Toque", desc: "Flash de impacto. Gancho heavy, contexto rápido, cierre explosivo. Lenguaje sin anestesia, tipografía grande.", precio: 200, badge: "Flash", badgeColor: "#38bdf8", alcance: 6500, plataformas: ["IG Feed", "TikTok", "X"] },
        { id: "carrusel_e2", nombre: "Estilo 2 · La Vuelta Completa", desc: "Análisis profundo. Desarma la noticia, perfil de jugadores, desglose, diccionario CED. Contenido que se guarda.", precio: 400, badge: "Deep Dive", badgeColor: "#818cf8", alcance: 8000, plataformas: ["IG Feed", "TikTok", "Historias", "X"] },
      ]},
      { id: "meme", tipo: "Meme", emoji: "😂", color: "#f59e0b", variantes: [
        { id: "meme_mencion", nombre: "Mención en Meme", desc: "Meme viral intacto. Tu marca en el caption con CTA. Máximo rebote orgánico, mínima fricción.", precio: 200, badge: "Estándar", badgeColor: "#fbbf24", alcance: 5000, plataformas: ["IG", "X", "TikTok", "WhatsApp"] },
        { id: "meme_emp", nombre: "Meme Personalizado Emprendimiento", desc: "Meme creado a medida sobre el universo del emprendimiento. Identidad de marca integrada.", precio: 300, badge: "Premium", badgeColor: "#f97316", alcance: 6000, plataformas: ["IG", "X", "TikTok", "WhatsApp"] },
      ]},
      { id: "video", tipo: "Video / Reel", emoji: "🎥", color: "#8b5cf6", variantes: [
        { id: "video_simple", nombre: "Video Simple / Explicativo", desc: "Video de tema con integración de marca. Al Vuelo, análisis o reacción. 30–60 segundos.", precio: 200, badge: "Estándar", badgeColor: "#a78bfa", alcance: 8000, plataformas: ["IG Reels", "TikTok", "YouTube Shorts"] },
        { id: "video_custom", nombre: "Video Personalizado", desc: "Producción creativa a medida. Precio base $300; el precio final depende del requerimiento.", precio: 300, badge: "Creativo", badgeColor: "#c084fc", precioVariable: true, alcance: 10000, plataformas: ["IG Reels", "TikTok", "YouTube Shorts", "Historias"] },
      ]},
      { id: "historia", tipo: "Historias", emoji: "⚡", color: "#10b981", variantes: [{ id: "historia_std", nombre: "Historia con marca", desc: "Secuencia de 3–5 slides con stickers interactivos y arte de marca.", precio: 20, badge: "Stories", badgeColor: "#10b981", alcance: 1800, plataformas: ["IG Historias", "TikTok"] }] },
    ];

    function getMIDescuento(total) {
      if (total >= 30) return 0.20;
      if (total >= 20) return 0.15;
      if (total >= 12) return 0.10;
      if (total >= 7)  return 0.05;
      return 0;
    }

    const DESCUENTOS_ESCALA = [
      { min: 7,  label: "7+ piezas",  pct: "5%",  color: "#6b7280" },
      { min: 12, label: "12+ piezas", pct: "10%", color: "#9ca3af" },
      { min: 20, label: "20+ piezas", pct: "15%", color: "#d1d5db" },
      { min: 30, label: "30+ piezas", pct: "20%", color: "#10b981" },
    ];

    function TagMI({ label, color }) {
      return <span style={{ background: `${color}20`, color, border: `1px solid ${color}40`, borderRadius: 4, padding: "1px 7px", fontSize: 10, fontWeight: 700, marginRight: 4, marginBottom: 2, display: "inline-block", whiteSpace: "nowrap" }}>{label}</span>;
    }

    function BarMI({ pct, color }) {
      return (
        <div style={{ background: "#1a1a2e", borderRadius: 3, height: 4, overflow: "hidden", marginTop: 4 }}>
          <div style={{ width: `${Math.min(pct, 100)}%`, background: `linear-gradient(90deg, ${color}60, ${color})`, height: "100%", borderRadius: 3, transition: "width 0.5s ease" }} />
        </div>
      );
    }

    function MatrizIndividual() {
      const [carrito, setCarrito] = useState({});

      const addMI  = (varId) => setCarrito(p => ({ ...p, [varId]: (p[varId] || 0) + 1 }));
      const subMI  = (varId) => setCarrito(p => {
        const n = (p[varId] || 0) - 1;
        if (n <= 0) { const c = { ...p }; delete c[varId]; return c; }
        return { ...p, [varId]: n };
      });

          <nav className="ced-nav">
            <div className="ced-nav-logo">⚡ CED · 2026</div>
            <div className="ced-nav-tabs">
              {TABS.map(t => (
                <button
                  key={t.id}
                  className={`ced-nav-tab${activeTab === t.id ? " active" : ""}`}
                  onClick={() => setActiveTab(t.id)}
                >
                  {t.label}
                </button>
              ))}
            </div>
          </nav>
          <ActiveComponent />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
